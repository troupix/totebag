<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./favicon.png">
    <title>Tote Bag Inc.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tote Bag Inc.</h1>
            <p>La seule startup qui ose vous vendre un tote bag unique.</p>
        </header>
        <main>
            <div class="product">
                <img src="photo_totebag.png" alt="Tote bag sérigraphié" id="product-image">
                <h2>Le Tote Bag "Révélation"</h2>
                <p class="price">Prix : Inestimable</p>
                <button id="order-button">Commander</button>
            </div>
        </main>
        <footer>
            <p>&copy; 2026 Tote Bag Inc. Tous droits (mal) acquis.</p>
        </footer>
    </div>

    <div id="popup" class="popup-container">
        <div class="popup-content">
            <p>Oui j'ai du temps à perdre et un humour bizarre.</p>
            <button id="close-popup">Fermer</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
